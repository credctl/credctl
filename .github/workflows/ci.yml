name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Govulncheck
        run: govulncheck ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Gosec
        run: gosec -exclude=G104,G115,G117,G204,G304,G703 ./...

      - name: Build app bundle (ad-hoc signing)
        run: make build SIGNING_IDENTITY="-"

  build-and-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Install TPM simulator dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Build
        run: CGO_ENABLED=0 go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage (includes TPM simulator tests)
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1
