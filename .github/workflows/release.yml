name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-darwin:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          CERT_PATH=$RUNNER_TEMP/certificate.p12

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/embedded.provisionprofile
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > "$PP_PATH"
          cp "$PP_PATH" embedded.provisionprofile

      - name: Build
        run: |
          make build \
            VERSION=${{ steps.version.outputs.VERSION }} \
            SIGNING_IDENTITY="${{ secrets.APPLE_SIGNING_IDENTITY }}"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ZIP_PATH=$RUNNER_TEMP/credctl.zip
          ditto -c -k --keepParent build/credctl.app "$ZIP_PATH"

          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 30m

          xcrun stapler staple build/credctl.app

      - name: Package
        run: make package VERSION=${{ steps.version.outputs.VERSION }}

      - name: Release (darwin)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/credctl-${{ steps.version.outputs.VERSION }}-darwin-arm64.tar.gz
            dist/checksums.txt

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          SHA256=$(awk '{print $1}' dist/checksums.txt)
          VERSION=${{ steps.version.outputs.VERSION }}

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/credctl/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/credctl.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/credctl.rb

          git config user.name "credctl-bot"
          git config user.email "bot@credctl.com"
          git add Casks/credctl.rb
          git commit -m "Update credctl to ${VERSION}"
          git push

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db || true

  release-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Linux amd64
        run: |
          make build-linux VERSION=${{ steps.version.outputs.VERSION }}

      - name: Build Linux arm64
        run: |
          make build-linux-arm64 VERSION=${{ steps.version.outputs.VERSION }}

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/credctl-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz -C build credctl-linux-amd64
          tar -czf dist/credctl-${{ steps.version.outputs.VERSION }}-linux-arm64.tar.gz -C build credctl-linux-arm64
          cd dist && shasum -a 256 *.tar.gz > checksums-linux.txt

      - name: Release (linux)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/credctl-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz
            dist/credctl-${{ steps.version.outputs.VERSION }}-linux-arm64.tar.gz
            dist/checksums-linux.txt
